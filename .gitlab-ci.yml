stages:
  - build
  - deploy

variables:
  REGISTRY: 'registry.internal.st'
  SWARM_SERVICE_NAME: 'du-assembly_TheAssembly'

build:
  image: docker:latest
  stage: build
  variables:
   GIT_SUBMODULE_STRATEGY: recursive
  script:
   - docker build --pull -t "$REGISTRY/anya/$CI_PROJECT_NAME" .
   - docker push "$REGISTRY/anya/$CI_PROJECT_NAME"

deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "production"'
  script:
    - docker service update --image "$REGISTRY/anya/$CI_PROJECT_NAME" "$SWARM_SERVICE_NAME" --detach 